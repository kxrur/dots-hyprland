# Don't print a new line at the start of the prompt
add_newline = false
# Pipes в•°в”Җ в•ӯв”Җ
# Powerline symbols В оӮ° оӮұ оӮІ оӮі оӮҙ оӮө оӮ¶ оӮ· оӮё оӮ№ оӮә оӮ» оӮј оӮҪ оӮҫ оӮҝ оғҖ оғҒ оғӮ оғғ оғ„ оғ… оғҶ оғҮ оғҲ оғҠ  оғҢ оғҚ оғҺ оғҸ оғҗ оғ‘ оғ” оғ’ 
# Wedges рҹӯ§рҹӯ’ рҹӯЈрҹӯ§рҹӯ“
# Random noise рҹ¬–рҹ¬Ҙрҹ¬”рҹ¬—

# format = """
# $directory $fill $git_branch $cmd_duration
#  $character"""
format = """
$cmd_duration$directory $git_branch
$character
"""

# Replace the "вқҜ" symbol in the prompt with "вһң"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[вҖўп‘„ пӮ©](bold fg:#9DCEFF) "
error_symbol = "[вҖўп‘„ у°…ҷ](bold fg:#FFBAC2) "

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[git_branch]
style = "bg: green"
symbol = "у°ҳ¬"
truncation_length = 4
truncation_symbol = ""
format = "вҖў [оӮ¶](bold fg:#D8AFFF)[$symbol $branch(:$remote_branch)](fg:black bg:#D8AFFF)[оӮҙ ](bold fg:#D8AFFF)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold red)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](green)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:cyan bold fg:black)[оӮҙ](bold fg:cyan )"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed green"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:252 fg:235"
style_root = "red bold"
format = "[оӮ¶](bold fg:252)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#FFBAC2 fg:#1B1A21"
truncation_length = 6
truncation_symbol = "вҖўвҖў/"
format = '[оӮ¶](bold fg:#FFBAC2)[$path ]($style)[оӮҙ](bold fg:#FFBAC2)'


[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:#FFDCF3)[оӯұ $duration](bold bg:#FFDCF3 fg:#1B1A21)[оӮҙ](bold fg:#FFDCF3) вҖўвҖў '
